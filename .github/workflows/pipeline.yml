name: SGF DR FINANCAS - NAV to BigQuery

on:
  schedule:
      - cron: "0 8 * * *"
        workflow_dispatch:

        permissions:
          contents: read
            id-token: write

            jobs:
              extract-and-load:
                  name: Extrair NAV e carregar no BigQuery
                      runs-on: ubuntu-latest
                          timeout-minutes: 15

                              steps:
                                    - name: Checkout do repositorio
                                            uses: actions/checkout@v4

                                                  - name: Autenticar no Google Cloud via Workload Identity
                                                          uses: google-github-actions/auth@v2
                                                                  with:
                                                                            workload_identity_provider: projects/845636354108/locations/global/workloadIdentityPools/github-pool/providers/github-provider
                                                                                      service_account: sgf-pipeline@golden-sgf-data.iam.gserviceaccount.com

                                                                                            - name: Configurar Python 3.11
                                                                                                    uses: actions/setup-python@v5
                                                                                                            with:
                                                                                                                      python-version: "3.11"
                                                                                                                                cache: "pip"
                                                                                                                                
                                                                                                                                      - name: Instalar dependencias
                                                                                                                                              run: pip install -r requirements.txt
                                                                                                                                              
                                                                                                                                                    - name: Executar pipeline
                                                                                                                                                            env:
                                                                                                                                                                      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
                                                                                                                                                                              run: python scripts/extract_to_bq.py
